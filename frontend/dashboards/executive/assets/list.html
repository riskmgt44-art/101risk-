<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset List • RiskMGT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --primary: #5DA1A1;
            --primary-hover: #4e9393;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-muted: #888888;
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --border: #e8e8e8;
            --shadow-sm: 0 3.2px 9.6px rgba(0,0,0,0.06);
            --shadow-md: 0 9.6px 25.6px rgba(0,0,0,0.08);
            --radius: 12.8px;
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Enable scrolling on entire page */
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            padding: 32px;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        
        .table-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 60px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        
        /* Define column widths */
        table th:nth-child(1), table td:nth-child(1) { width: 25%; }
        table th:nth-child(2), table td:nth-child(2) { width: 15%; }
        table th:nth-child(3), table td:nth-child(3) { width: 12%; }
        table th:nth-child(4), table td:nth-child(4) { width: 12%; }
        table th:nth-child(5), table td:nth-child(5) { width: 12%; }
        table th:nth-child(6), table td:nth-child(6) { width: 12%; }
        table th:nth-child(7), table td:nth-child(7) { width: 12%; }
        
        thead {
            background: rgba(93,161,161,0.06);
        }
        
        th {
            text-align: left;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            border-bottom: 2px solid var(--border);
        }
        
        td {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 14px;
            vertical-align: middle;
            line-height: 1.5;
        }
        
        tr:hover {
            background: rgba(93,161,161,0.03);
        }
        
        .asset-name {
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .asset-name:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        
        .category-badge {
            font-size: 12px;
            padding: 4px 10px;
            background: rgba(93,161,161,0.15);
            color: var(--primary);
            border-radius: 6px;
            font-weight: 500;
            display: inline-block;
            white-space: nowrap;
        }
        
        .no-assets {
            text-align: center;
            padding: 80px 32px;
            color: var(--text-muted);
            font-size: 16px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 80px;
            color: var(--text-muted);
            font-size: 16px;
        }
        
        .table-wrapper {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        
        .table-wrapper::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .table-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
        }
        
        .action-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .action-btn:hover {
            background: rgba(93,161,161,0.1);
            color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        
        .action-btn.risk-view {
            width: auto;
            padding: 6px 12px;
            gap: 6px;
        }
        
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            max-width: 400px;
            min-width: 250px;
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: var(--transition);
            background-color: white;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(93,161,161,0.1);
        }
        
        .filter-options {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            min-width: 140px;
        }
        
        .clear-filters-btn {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .clear-filters-btn:hover {
            background: rgba(93,161,161,0.1);
            color: var(--primary);
            border-color: var(--primary);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 32px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--border);
        }
        
        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-overlay.open {
            display: flex;
        }
        
        .risk-modal {
            background: white;
            width: 90%;
            max-width: 1400px;
            max-height: 85vh;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-md);
        }
        
        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border-radius: var(--radius) var(--radius) 0 0;
            flex-shrink: 0;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .modal-title i {
            color: var(--primary);
            margin-right: 12px;
        }
        
        .modal-close {
            cursor: pointer;
            font-size: 24px;
            color: var(--text-secondary);
            transition: var(--transition);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        
        .modal-close:hover {
            background: rgba(93,161,161,0.1);
            color: var(--text-primary);
        }
        
        .modal-body {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        
        .modal-body .table-wrapper {
            max-height: 50vh;
            overflow-y: auto;
        }
        
        .modal-body .table-wrapper::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        .risk-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .risk-table th {
            background: rgba(93,161,161,0.08);
            padding: 12px 16px;
            font-weight: 600;
            font-size: 12px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
            border-bottom: 2px solid var(--border);
        }
        
        .risk-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .risk-table tr:hover {
            background: rgba(93,161,161,0.03);
        }
        
        .risk-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .risk-pill.critical { background: rgba(239,68,68,0.1); color: #dc2626; }
        .risk-pill.high { background: rgba(245,158,11,0.1); color: #d97706; }
        .risk-pill.medium { background: rgba(93,161,161,0.1); color: var(--primary); }
        .risk-pill.low { background: rgba(16,185,129,0.1); color: #10b981; }
        
        .risk-link {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        
        .risk-link:hover {
            text-decoration: underline;
        }
        
        .asset-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(93,161,161,0.05);
            border-radius: var(--radius);
        }
        
        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            
            .table-container {
                border-radius: 8px;
            }
            
            .table-wrapper {
                max-height: calc(100vh - 200px);
            }
            
            th, td {
                padding: 12px 16px;
            }
            
            .page-title {
                font-size: 20px;
            }
            
            .table-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                max-width: 100%;
                min-width: 100%;
            }
            
            .filter-options {
                width: 100%;
                justify-content: space-between;
            }
            
            .filter-select {
                flex: 1;
                min-width: 0;
            }
            
            table th:nth-child(3), table td:nth-child(3) { display: none; }
            table th:nth-child(4), table td:nth-child(4) { width: 15%; }
            table th:nth-child(5), table td:nth-child(5) { display: none; }
            table th:nth-child(6), table td:nth-child(6) { width: 15%; }
            table th:nth-child(7), table td:nth-child(7) { width: 15%; }
        }
    </style>
</head>
<body>
    <h1 class="page-title">Asset List</h1>
    
    <div class="table-controls">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search assets...">
        </div>
        <div class="filter-options">
            <select class="filter-select" id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Department">Department</option>
                <option value="Business Unit">Business Unit</option>
                <option value="Production Asset">Production Asset</option>
                <option value="Location">Location</option>
                <option value="Other">Other</option>
            </select>
            <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
            <button class="clear-filters-btn" onclick="clearFilters()">
                Clear
            </button>
        </div>
    </div>
    
    <div id="loading" class="loading-spinner">
        <div style="display:inline-block; width:20px; height:20px; border:3px solid rgba(93,161,161,0.3); border-radius:50%; border-top-color:var(--primary); animation:spin 1s ease-in-out infinite; margin-right:10px;"></div>
        Loading assets...
    </div>
    
    <div id="tableContainer" class="table-container" style="display:none;">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Asset Name</th>
                        <th>Category</th>
                        <th>Nature</th>
                        <th>Location</th>
                        <th>Owner</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="assetsTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Risk Modal -->
    <div id="riskModal" class="modal-overlay">
        <div class="risk-modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-chart-line"></i>
                    <span id="modalAssetName">Risks by Asset</span>
                </div>
                <div class="modal-close" onclick="closeRiskModal()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body">
                <div id="assetStats" class="asset-stats"></div>
                <div class="table-wrapper">
                    <table class="risk-table" id="riskTable">
                        <thead>
                            <tr>
                                <th>Risk ID</th>
                                <th>Title</th>
                                <th>Type</th>
                                <th>HSSE RAM</th>
                                <th>Risk Visual RAM</th>
                                <th>Status</th>
                                <th>Owner</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="riskTableBody">
                            <tr>
                                <td colspan="8" style="text-align:center; padding:40px;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading risks...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allAssets = [];
        let allRisks = [];
        
        async function loadAssets() {
            const token = localStorage.getItem('token');
            if (!token) {
                document.getElementById('loading').innerHTML = 
                    '<div class="empty-state">' +
                    '<i class="fas fa-lock"></i>' +
                    '<h3>Authentication Required</h3>' +
                    '<p>Please log in to view assets</p>' +
                    '<button onclick="window.parent.location.href=\'auth/login.html\'" style="padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;">Go to Login</button>' +
                    '</div>';
                return;
            }

            try {
                const response = await fetch('/api/assets', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error(`Failed to load assets (${response.status})`);
                }

                const assets = await response.json();
                allAssets = assets;
                
                // Also load risks for filtering
                await loadRisks();
                
                const loading = document.getElementById('loading');
                const tableContainer = document.getElementById('tableContainer');

                loading.style.display = 'none';
                tableContainer.style.display = 'block';

                renderAssets(assets);
                
            } catch (err) {
                console.error('Error loading assets:', err);
                document.getElementById('loading').innerHTML = 
                    '<div class="empty-state">' +
                    '<i class="fas fa-exclamation-circle" style="color:#ef4444;"></i>' +
                    '<h3>Error Loading Assets</h3>' +
                    '<p>' + err.message + '</p>' +
                    '<button onclick="loadAssets()" style="padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;">Retry</button>' +
                    '</div>';
            }
        }
        
        async function loadRisks() {
            const token = localStorage.getItem('token');
            if (!token) return;
            
            try {
                const response = await fetch('/api/risks', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    allRisks = Array.isArray(data) ? data : (data.risks || []);
                }
            } catch (err) {
                console.error('Error loading risks:', err);
            }
        }
        
        function getRiskLevelClass(ramLevel) {
            if (!ramLevel) return '';
            const level = ramLevel.toLowerCase();
            if (level.includes('very high') || level.includes('critical')) return 'critical';
            if (level.includes('high')) return 'high';
            if (level.includes('medium')) return 'medium';
            return 'low';
        }
        
        function showRisksForAsset(assetId, assetName) {
            const modal = document.getElementById('riskModal');
            const modalAssetName = document.getElementById('modalAssetName');
            const riskTableBody = document.getElementById('riskTableBody');
            const assetStats = document.getElementById('assetStats');
            
            modalAssetName.innerHTML = `<i class="fas fa-chart-line"></i> Risks for: ${escapeHtml(assetName)}`;
            
            // Filter risks for this asset
            const assetRisks = allRisks.filter(risk => {
                // Check if risk is linked to this asset
                if (risk.assetId === assetId) return true;
                if (risk.linkedAssets && risk.linkedAssets.includes(assetId)) return true;
                if (risk.assetId && risk.assetId.toString() === assetId.toString()) return true;
                return false;
            });
            
            // Calculate stats
            const criticalCount = assetRisks.filter(r => getRiskLevelClass(r.hsseRamCurrent) === 'critical').length;
            const highCount = assetRisks.filter(r => getRiskLevelClass(r.hsseRamCurrent) === 'high').length;
            const mediumCount = assetRisks.filter(r => getRiskLevelClass(r.hsseRamCurrent) === 'medium').length;
            const lowCount = assetRisks.filter(r => getRiskLevelClass(r.hsseRamCurrent) === 'low').length;
            
            assetStats.innerHTML = `
                <div class="stat-item">
                    <span class="stat-label">Total Risks:</span>
                    <span class="stat-value">${assetRisks.length}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Critical:</span>
                    <span class="stat-value" style="color:#dc2626;">${criticalCount}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">High:</span>
                    <span class="stat-value" style="color:#d97706;">${highCount}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Medium:</span>
                    <span class="stat-value" style="color:var(--primary);">${mediumCount}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Low:</span>
                    <span class="stat-value" style="color:#10b981;">${lowCount}</span>
                </div>
            `;
            
            if (assetRisks.length === 0) {
                riskTableBody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center; padding:60px;">
                            <i class="fas fa-shield-alt" style="font-size:48px; opacity:0.3; margin-bottom:16px; display:block;"></i>
                            <h3>No Risks Found</h3>
                            <p style="color: var(--text-muted);">This asset has no associated risks.</p>
                        </td>
                    </tr>
                `;
            } else {
                let html = '';
                assetRisks.forEach(risk => {
                    const riskLevelClass = getRiskLevelClass(risk.hsseRamCurrent);
                    const riskVisualLevelClass = getRiskLevelClass(risk.riskVisualRamCurrent);
                    
                    html += `
                        <tr>
                            <td>
                                <a class="risk-link" onclick="viewRiskDetail('${risk._id || risk.id}')">
                                    ${escapeHtml(risk.riskId || 'RISK-' + String(risk._id || risk.id).slice(-6))}
                                </a>
                            </td>
                            <td style="max-width: 200px; white-space: normal; word-wrap: break-word;">
                                <a class="risk-link" onclick="viewRiskDetail('${risk._id || risk.id}')">
                                    ${escapeHtml(risk.title || 'Untitled Risk')}
                                </a>
                            </td>
                            <td>
                                <span class="risk-pill ${risk.type?.toLowerCase() === 'upside' ? 'low' : 'critical'}">
                                    ${escapeHtml(risk.type || 'Downside')}
                                </span>
                            </td>
                            <td>
                                <span class="risk-pill ${riskLevelClass}">
                                    ${escapeHtml(risk.hsseRamCurrent || '—')}
                                </span>
                            </td>
                            <td>
                                <span class="risk-pill ${riskVisualLevelClass}">
                                    ${escapeHtml(risk.riskVisualRamCurrent || '—')}
                                </span>
                            </td>
                            <td>
                                <span class="risk-pill">
                                    ${escapeHtml(risk.status || 'Open')}
                                </span>
                            </td>
                            <td>${escapeHtml(risk.riskOwnerName || '—')}</td>
                            <td>
                                <button class="action-btn" onclick="viewRiskDetail('${risk._id || risk.id}')" title="View Risk">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                riskTableBody.innerHTML = html;
            }
            
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        
        function closeRiskModal() {
            const modal = document.getElementById('riskModal');
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }
        
        function viewRiskDetail(riskId) {
            window.open(`risk-detail.html?id=${riskId}`, '_blank');
        }
        
        function renderAssets(assets) {
            const tableBody = document.getElementById('assetsTableBody');
            
            if (!assets || assets.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7">' +
                    '<div class="empty-state">' +
                    '<i class="fas fa-box-open"></i>' +
                    '<h3>No Assets Found</h3>' +
                    '<p>No assets match your current filters</p>' +
                    '<button onclick="clearFilters()" style="padding:8px 16px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;">Clear Filters</button>' +
                    '</div>' +
                    '</td></tr>';
                return;
            }

            let html = '';
            assets.forEach(asset => {
                const createdDate = new Date(asset.createdAt);
                const assetId = asset.id || asset._id;
                
                html += `
                    <tr>
                        <td>
                            <span class="asset-name truncate" title="${escapeHtml(asset.name || 'Unnamed Asset')}" onclick="viewAssetDetail('${assetId}')">
                                ${escapeHtml(asset.name || 'Unnamed Asset')}
                            </span>
                        </td>
                        <td>
                            <span class="category-badge" title="${escapeHtml(asset.category || 'Uncategorized')}">
                                ${escapeHtml(asset.category || 'Uncategorized')}
                            </span>
                        </td>
                        <td>
                            <span class="truncate" title="${escapeHtml(asset.nature || '-')}">
                                ${escapeHtml(asset.nature || '-')}
                            </span>
                        </td>
                        <td>
                            <span class="truncate" title="${escapeHtml(asset.location || '-')}">
                                ${escapeHtml(asset.location || '-')}
                            </span>
                        </td>
                        <td>
                            <span class="truncate" title="${escapeHtml(asset.owner || '-')}">
                                ${escapeHtml(asset.owner || '-')}
                            </span>
                        </td>
                        <td>
                            <span class="truncate" title="${createdDate.toLocaleDateString()}">
                                ${createdDate.toLocaleDateString()}
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn risk-view" onclick="showRisksForAsset('${assetId}', '${escapeHtml(asset.name || 'Unnamed Asset')}')" title="View Risks">
                                    <i class="fas fa-chart-line"></i> Risks
                                </button>
                                <button class="action-btn" onclick="viewAssetDetail('${assetId}')" title="View Details">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="action-btn" onclick="editAsset('${assetId}')" title="Edit Asset">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
        }

        function filterAssets() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            const filteredAssets = allAssets.filter(asset => {
                const matchesSearch = !searchTerm || 
                    (asset.name && asset.name.toLowerCase().includes(searchTerm)) ||
                    (asset.category && asset.category.toLowerCase().includes(searchTerm)) ||
                    (asset.owner && asset.owner.toLowerCase().includes(searchTerm)) ||
                    (asset.location && asset.location.toLowerCase().includes(searchTerm)) ||
                    (asset.nature && asset.nature.toLowerCase().includes(searchTerm));
                
                const matchesCategory = !categoryFilter || asset.category === categoryFilter;
                const matchesStatus = !statusFilter || asset.status === statusFilter;
                
                return matchesSearch && matchesCategory && matchesStatus;
            });
            
            renderAssets(filteredAssets);
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('statusFilter').value = '';
            filterAssets();
        }

        function viewAssetDetail(assetId) {
            if (window.parent && window.parent.loadIframePage) {
                window.parent.loadIframePage('assets/detail.html?id=' + assetId);
            } else {
                window.location.href = 'detail.html?id=' + assetId;
            }
        }

        function editAsset(assetId) {
            viewAssetDetail(assetId);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize event listeners
        document.getElementById('searchInput').addEventListener('input', filterAssets);
        document.getElementById('categoryFilter').addEventListener('change', filterAssets);
        document.getElementById('statusFilter').addEventListener('change', filterAssets);
        
        // Close modal on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeRiskModal();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
        
        // Close modal on overlay click
        document.getElementById('riskModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeRiskModal();
            }
        });

        // Animation for spinner
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);

        window.addEventListener('load', loadAssets);
        
        // Make functions globally available
        window.showRisksForAsset = showRisksForAsset;
        window.closeRiskModal = closeRiskModal;
        window.viewRiskDetail = viewRiskDetail;
        window.clearFilters = clearFilters;
        window.viewAssetDetail = viewAssetDetail;
        window.editAsset = editAsset;
    </script>
</body>
</html>
